# 个人皮肤补丁 — 由 git 管理
# ⚠️ 不要通过 Weasel GUI 点「确定」保存，会覆盖此文件。改皮肤请直接编辑此文件。
# 切换皮肤：编辑 style/color_scheme 的值 → 保存 → 右键托盘 → 重新部署
patch:
  # ── 当前皮肤（改这里切换） ──
  style/color_scheme: apple_dark
  # 可选：apple_light, apple_dark, mac_dark, purity_of_form_custom

  # ═══════════════════════════════════════════
  # 皮肤 1：Apple Light — macOS 浅色风格
  # ═══════════════════════════════════════════
  preset_color_schemes/apple_light:
    name: "蘋果淺色／Apple Light"
    author: sakuradairong
    text_color: 0x3C3C43          # 拼音区
    back_color: 0xF9F9F9          # 候选窗背景
    border_color: 0xD1D1D6        # 边框
    label_color: 0x8E8E93         # 序号
    comment_text_color: 0x8E8E93  # 注释
    candidate_text_color: 0x1C1C1E # 候选词
    hilited_text_color: 0x1C1C1E  # 编码区文字
    hilited_back_color: 0xF2F2F7  # 编码区背景
    hilited_candidate_text_color: 0xFFFFFF   # 选中文字
    hilited_candidate_back_color: 0x007AFF   # 选中背景（Apple Blue）
    hilited_candidate_border_color: 0x007AFF # 选中边框
    hilited_candidate_label_color: 0xFFFFFF  # 选中序号
    hilited_comment_text_color: 0xBFBFBF     # 选中注释
    shadow_color: 0x18000000      # 微弱阴影

  # ═══════════════════════════════════════════
  # 皮肤 2：Apple Dark — macOS 暗色风格
  # ═══════════════════════════════════════════
  preset_color_schemes/apple_dark:
    name: "蘋果暗黑／Apple Dark"
    author: sakuradairong
    text_color: 0xF5F5F7
    back_color: 0x1C1C1E
    border_color: 0x3A3A3C
    label_color: 0x8E8E93
    comment_text_color: 0x8E8E93
    candidate_text_color: 0xF5F5F7
    hilited_text_color: 0xF5F5F7
    hilited_back_color: 0x1C1C1E
    hilited_candidate_text_color: 0xFFFFFF
    hilited_candidate_back_color: 0x0A84FF
    hilited_candidate_border_color: 0x0A84FF
    hilited_candidate_label_color: 0xFFFFFF
    hilited_comment_text_color: 0xBFBFBF
    shadow_color: 0x40000000

  # ═══════════════════════════════════════════
  # 皮肤 3：Mac Dark — 更深邃的暗色
  # ═══════════════════════════════════════════
  preset_color_schemes/mac_dark:
    name: "深邃暗黑／Mac Dark"
    author: sakuradairong
    text_color: 0xCCCCCC
    back_color: 0x0D0D0F
    border_color: 0x2A2A2D
    label_color: 0x6E6E73
    comment_text_color: 0x6E6E73
    candidate_text_color: 0xE5E5EA
    hilited_text_color: 0xE5E5EA
    hilited_back_color: 0x0D0D0F
    hilited_candidate_text_color: 0xFFFFFF
    hilited_candidate_back_color: 0xFF5F57
    hilited_candidate_border_color: 0xFF5F57
    hilited_candidate_label_color: 0xFFFFFF
    hilited_comment_text_color: 0x999999
    shadow_color: 0x60000000

  # ═══════════════════════════════════════════
  # 皮肤 4：纯粹的形式（保留原版）
  # ═══════════════════════════════════════════
  preset_color_schemes/purity_of_form_custom:
    name: "純粹的形式／Purity of Form Custom"
    author: 雨過之後、佛振
    text_color: 0x808080
    back_color: 0x545554
    label_color: 0xBBBBBB
    border_color: 0x545554
    shadow_color: 0xb4000000
    comment_text_color: 0x808080
    candidate_text_color: 0xEEEEEE
    hilited_text_color: 0xEEEEEE
    hilited_comment_text_color: 0x808080
    hilited_candidate_back_color: 0xE3E3E3
    hilited_candidate_border_color: 0xE3E3E3
    hilited_candidate_label_color: 0x4C4C4C
    hilited_candidate_text_color: 0x000000

  # ── 字体 ──
  style/font_face: "Segoe UI Emoji:23:23, Segoe UI Emoji:2a:2a, Segoe UI Emoji:30:39, Segoe UI Emoji:fe0f:fe0f, Segoe UI Emoji:20e3:20e3, Segoe UI, Microsoft YaHei, DengXian, Segoe UI Emoji, Noto Color Emoji, Segoe UI Symbol"
  style/label_font_face: "Microsoft YaHei"
  style/comment_font_face: "Microsoft YaHei"
  style/font_point: 12
  style/label_font_point: 12
  style/comment_font_point: 11

  # ── 候选窗口 ──
  style/inline_preedit: true
  style/preedit_type: composition
  style/horizontal: true
  style/fullscreen: false
  style/display_tray_icon: false
  style/label_format: "%s"
  style/mark_text: ""
  style/hover_type: none
  style/paging_on_scroll: true
  style/candidate_abbreviate_length: 30

  # ── 布局 ──
  style/layout/border_width: 1
  style/layout/margin_x: 8
  style/layout/margin_y: 6
  style/layout/spacing: 8
  style/layout/candidate_spacing: 16
  style/layout/hilite_spacing: 5
  style/layout/hilite_padding: 4
  style/layout/corner_radius: 8
  style/layout/round_corner: 5
  style/layout/shadow_radius: 6
