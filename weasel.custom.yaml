# 个人皮肤补丁 — 由 git 管理，不受 Weasel 设置界面覆盖影响
# ⚠️ 不要通过 Weasel GUI 修改皮肤，会丢失自定义配色。改皮肤请直接编辑此文件。
patch:
  # ── 皮肤配色 ──
  style/color_scheme: apple_dark

  preset_color_schemes/apple_dark:
    name: "蘋果暗黑／Apple Dark"
    author: 社区
    text_color: 0xCCCCCC
    back_color: 0x2D2D2D
    border_color: 0x3D3D3D
    label_color: 0x999999
    comment_text_color: 0x808080
    candidate_text_color: 0xFFFFFF
    hilited_text_color: 0xFFFFFF
    hilited_back_color: 0x2D2D2D
    hilited_candidate_text_color: 0xFFFFFF
    hilited_candidate_back_color: 0x0A84FF
    hilited_candidate_label_color: 0xFFFFFF
    hilited_comment_text_color: 0xAAAAAA
    shadow_color: 0x00000000

  preset_color_schemes/purity_of_form_custom:
    name: "純粹的形式／Purity of Form Custom"
    author: 雨過之後、佛振
    text_color: 0x808080
    back_color: 0x545554
    label_color: 0xBBBBBB
    border_color: 0x545554
    shadow_color: 0xb4000000
    comment_text_color: 0x808080
    candidate_text_color: 0xEEEEEE
    hilited_text_color: 0xEEEEEE
    hilited_comment_text_color: 0x808080
    hilited_candidate_back_color: 0xE3E3E3
    hilited_candidate_border_color: 0xE3E3E3
    hilited_candidate_label_color: 0x4C4C4C
    hilited_candidate_text_color: 0x000000

  # ── 字体 ──
  style/font_face: "Segoe UI Emoji:23:23, Segoe UI Emoji:2a:2a, Segoe UI Emoji:30:39, Segoe UI Emoji:fe0f:fe0f, Segoe UI Emoji:20e3:20e3, Segoe UI, Microsoft YaHei, DengXian, Segoe UI Emoji, Noto Color Emoji, Segoe UI Symbol"
  style/label_font_face: "Microsoft YaHei"
  style/comment_font_face: "Microsoft YaHei"
  style/font_point: 14
  style/label_font_point: 14
  style/comment_font_point: 13

  # ── 候选窗口 ──
  style/inline_preedit: true
  style/preedit_type: composition
  style/horizontal: true
  style/fullscreen: false
  style/display_tray_icon: false
  style/label_format: "%s"
  style/mark_text: ""
  style/hover_type: none
  style/paging_on_scroll: true
  style/candidate_abbreviate_length: 30

  # ── 布局 ──
  style/layout/border_width: 2
  style/layout/margin_x: 8
  style/layout/margin_y: 8
  style/layout/spacing: 13
  style/layout/candidate_spacing: 22
  style/layout/hilite_spacing: 6
  style/layout/hilite_padding: 8
  style/layout/corner_radius: 8
  style/layout/round_corner: 8
  style/layout/shadow_radius: 0
