customization:
  distribution_code_name: Weasel
  distribution_version: 0.17.4
  generator: "Rime::SwitcherSettings"
  modified_time: "Mon May 18 19:23:33 2026"
  rime_version: 1.13.1
patch:
  ascii_composer:
    good_old_caps_lock: true
    switch_key: {Caps_Lock: clear, Control_L: noop, Control_R: noop, Shift_L: clear, Shift_R: clear}
  menu:
    page_size: 5
  schema_list:
    - {schema: rime_ice}

  # 方案选单 — F4 弹出菜单
  switcher:
    fold_options: false       # 单方案展开，否则 F4 看不到
    save_options:
      - ascii_punct
      - traditionalization
      - emoji
      - full_shape
      - search_single_char

  # 按键：Tab 选词，方向键切音节
  key_binder/bindings/@1: { when: has_menu, accept: Tab, send: Return }
  navigator/bindings/Left: left_by_syllable
  navigator/bindings/Right: right_by_syllable
