customization:
  distribution_code_name: Weasel
  distribution_version: 0.17.4
  generator: "Rime::SwitcherSettings"
  modified_time: "Mon May 18 19:23:33 2026"
  rime_version: 1.13.1
patch:
  ascii_composer:
    good_old_caps_lock: true
    switch_key: {Caps_Lock: clear, Control_L: noop, Control_R: noop, Shift_L: clear, Shift_R: clear}
  menu:
    page_size: 8
  schema_list:
    - {schema: rime_ice}

  # 开关记忆 — F4 菜单里切换的选项会被记住，下次开机不丢失
  switcher:
    save_options:
      - ascii_punct         # 中英标点
      - traditionalization  # 简繁转换
      - emoji               # Emoji
      - full_shape          # 全半角
      - search_single_char  # 以字搜字